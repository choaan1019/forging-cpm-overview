<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#050403; overflow:hidden; }
  body { display:flex; align-items:center; justify-content:center;
    font-family:"Arial Rounded MT Bold","Varela Round","Segoe UI",system-ui,"Microsoft JhengHei",sans-serif;
    font-weight:700; color:#f5efe7; }
  .slide { position:relative; container-type:size;
    width:min(100vw,177.78vh); height:min(56.25vw,100vh); overflow:hidden;
    background:
      radial-gradient(circle at 18% 26%, rgba(255,138,40,.20), transparent 46%),
      radial-gradient(circle at 84% 74%, rgba(170,55,18,.26), transparent 52%),
      radial-gradient(circle at 62% 10%, rgba(255,196,70,.13), transparent 42%),
      #0a0705; }
  .tex { position:absolute; inset:0; width:100%; height:100%; opacity:.15;
    mix-blend-mode:screen; pointer-events:none; }
  .deco { position:absolute; opacity:.13; pointer-events:none; }
  .deco.d1 { top:-7cqh; left:-4cqw; width:25cqw; transform:rotate(-10deg); }
  .deco.d2 { bottom:-8cqh; right:-4cqw; width:30cqw; transform:rotate(155deg); }
  .wrap { position:relative; z-index:2; height:100%; padding:4.4cqh 3.4cqw 3cqh;
    display:flex; flex-direction:column; }
  .title { font-size:2.35cqw; line-height:1.12; letter-spacing:.25cqw; color:#ff7a1a;
    text-align:center; text-shadow:0 0 16px rgba(255,122,26,.35); }
  .title .u { display:block; width:13cqw; height:.55cqh; margin:1.3cqh auto 0; border-radius:1cqh;
    background:linear-gradient(90deg,transparent,#ff7a1a,#ffd23f,transparent); }
  .tbl { flex:1; min-height:0; margin-top:2.2cqh; display:grid;
    grid-template-columns:1.2fr 2.3fr 2.3fr 1.55fr;
    grid-template-rows:auto repeat(5,1fr); gap:.5cqh .55cqw; }
  .th { display:flex; align-items:center; justify-content:center; text-align:center;
    background:linear-gradient(135deg,#7a2e0c,#c2410c); color:#fff3e0;
    font-size:1.05cqw; letter-spacing:.3px; padding:.7cqh .4cqw; border-radius:.6cqw; }
  .c { display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.045); border:1px solid rgba(251,146,60,.22);
    border-radius:.8cqw; min-width:0; min-height:0; }
  .c.prod { justify-content:flex-start; padding-left:1cqw; font-size:2.4cqw;
    color:#ffffff; border-left:.45cqw solid #ff7a1a; }
  .big { font-size:2.4cqw; color:#ffd23f; line-height:1;
    text-shadow:0 0 12px rgba(255,210,63,.45); }
  .small { font-size:2.4cqw; color:#fb923c; line-height:1; }
  .langbtn { position:absolute; top:1.6cqh; right:2.2cqw; z-index:3;
    background:rgba(255,122,26,.14); color:#ff7a1a; border:.18cqw solid #ff7a1a;
    border-radius:2cqh; padding:.5cqh 1.3cqw; font-size:1.05cqw; font-weight:700;
    cursor:pointer; font-family:inherit; letter-spacing:.5px;
    transition:background .15s,color .15s; }
  .langbtn:hover { background:#ff7a1a; color:#1a0f06; }
  .c.cpm { padding:.35cqh .35cqw; }
  .card { position:relative; height:100%; width:100%; display:flex;
    align-items:center; justify-content:center; background:transparent;
    border:none; cursor:zoom-in; padding:0; }
  .card svg { height:100%; width:auto; max-width:100%;
    background:#fbf7f0; border-radius:.5cqw; padding:.3cqh .25cqw;
    transition:outline .12s; }
  .card:hover svg { outline:.28cqw solid #ff7a1a; }
  .card .hint { position:absolute; bottom:.3cqh; left:50%; transform:translateX(-50%);
    background:rgba(255,122,26,.92); color:#1a0f06; font-size:.74cqw; font-weight:700;
    padding:.12cqh .55cqw; border-radius:1cqh; white-space:nowrap; }
  .foot { margin-top:1.7cqh; text-align:center; font-size:1cqw; color:#caa07e; font-weight:600; }
  .foot b { color:#ffd23f; }
  /* 燈箱 */
  #modal { position:fixed; inset:0; background:rgba(5,4,3,.92); display:none; z-index:50; padding:3vh 3vw; }
  #modal.open { display:flex; flex-direction:column; }
  #modal-bar { flex:0 0 auto; color:#ffd23f; display:flex; justify-content:space-between;
    align-items:center; padding:.4rem .4rem 1rem;
    font-family:"Arial Rounded MT Bold","Segoe UI",sans-serif; }
  #modal-title { font-size:1.2rem; font-weight:700; }
  #modal-close { background:#ff7a1a; color:#1a0f06; border:none; border-radius:20px;
    padding:.4rem 1.1rem; font-size:.95rem; cursor:pointer; font-weight:700; }
  #modal-body { flex:1 1 auto; overflow:auto; background:#fbf7f0; border-radius:10px;
    padding:12px; text-align:center; }
  #modal-body svg { width:100%; max-width:960px; height:auto; margin:0 auto; }
</style>

    if(curCard) setTitle(curCard);
  }
  function setTitle(b){ title.textContent=b.dataset.product+'　'+(lang==='zh'?b.dataset.subZh:b.dataset.subEn); }
  function openModal(b){ curCard=b; var s=b.querySelector('svg'); body.innerHTML=''; body.appendChild(s.cloneNode(true)); setTitle(b); modal.classList.add('open'); }
  function closeModal(){ modal.classList.remove('open'); body.innerHTML=''; curCard=null; }
  document.querySelectorAll('.card').forEach(function(b){b.addEventListener('click',function(){openModal(b);});});
  document.getElementById('modal-close').addEventListener('click',function(e){e.stopPropagation();closeModal();});
  document.getElementById('langbtn').addEventListener('click',function(){ lang=(lang==='zh')?'en':'zh'; applyLang(); });
  modal.addEventListener('click',function(e){if(e.target===modal)closeModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  applyLang();
</script>
</body>
</html>
